<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" width="960" height="360" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="12">
  <style>
    :root { color-scheme: light dark; }
    .bg { fill: #ffffff; }
    .card { fill: #ffffff; stroke: #d4d4d4; stroke-width: 1; }
    .card-dim { fill: #fafafa; stroke: #d4d4d4; stroke-width: 1; }
    .title { fill: #171717; font-weight: 700; font-size: 13px; }
    .subtitle { fill: #737373; font-size: 10.5px; font-family: 'JetBrains Mono',monospace; }
    .badge { fill: #737373; font-size: 9.5px; font-family: 'JetBrains Mono',monospace; letter-spacing: 0.05em; }
    .label { fill: #525252; font-size: 11px; font-weight: 500; }
    .arrow { stroke: #a3a3a3; stroke-width: 1.2; fill: none; }
    .accent { fill: #d97706; }
    .accent-stroke { stroke: #d97706; stroke-width: 1.6; fill: none; }
    .accent-text { fill: #d97706; font-weight: 600; font-size: 10.5px; font-family: 'JetBrains Mono',monospace; letter-spacing: 0.04em; }
    .device-ring { fill: none; stroke: #d4d4d4; stroke-width: 1; stroke-dasharray: 3 3; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0a0a0a; }
      .card { fill: #111111; stroke: #2a2a2a; }
      .card-dim { fill: #0d0d0d; stroke: #1d1d1d; }
      .title { fill: #e8e8e8; }
      .subtitle { fill: #6b6b6b; }
      .badge { fill: #6b6b6b; }
      .label { fill: #b4b4b4; }
      .arrow { stroke: #404040; }
      .accent { fill: #fbbf24; }
      .accent-stroke { stroke: #fbbf24; }
      .accent-text { fill: #fbbf24; }
      .device-ring { stroke: #2a2a2a; }
    }
  </style>

  <rect class="bg" width="960" height="360"/>

  <!-- Title -->
  <text x="24" y="32" class="title" font-size="14">Nexos — Data Flow</text>
  <text x="24" y="48" class="subtitle">IoT device → ingestion → persistence · realtime · alerting → dashboard</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a3a3a3"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- ─── DEVICE ─── -->
  <g transform="translate(24, 140)">
    <rect class="card-dim" x="0" y="0" width="120" height="80" rx="8"/>
    <text x="60" y="28" text-anchor="middle" class="title">IoT Device</text>
    <text x="60" y="46" text-anchor="middle" class="subtitle">ESP32 · Pi · PLC</text>
    <text x="60" y="62" text-anchor="middle" class="badge">MQTT/TLS · publish</text>
  </g>

  <!-- arrow: device → broker -->
  <path class="arrow" d="M 144 180 L 194 180" marker-end="url(#arrow)"/>
  <text x="169" y="172" text-anchor="middle" class="badge">mqtts://</text>

  <!-- ─── BROKER ─── -->
  <g transform="translate(196, 140)">
    <rect class="card" x="0" y="0" width="140" height="80" rx="8"/>
    <text x="70" y="28" text-anchor="middle" class="title">Mosquitto</text>
    <text x="70" y="46" text-anchor="middle" class="subtitle">broker · TLS 1.2+</text>
    <text x="70" y="62" text-anchor="middle" class="badge">ACL per device</text>
  </g>

  <!-- arrow: broker → ingestion -->
  <path class="arrow" d="M 336 180 L 386 180" marker-end="url(#arrow)"/>
  <text x="361" y="172" text-anchor="middle" class="badge">devices/#</text>

  <!-- ─── INGESTION (center, double-height) ─── -->
  <g transform="translate(388, 92)">
    <rect class="card" x="0" y="0" width="192" height="176" rx="10"/>
    <text x="96" y="26" text-anchor="middle" class="title">Ingestion (Go + Fiber)</text>
    <text x="96" y="44" text-anchor="middle" class="subtitle">MQTT subscriber · topic parser</text>

    <!-- inner blocks -->
    <g transform="translate(12, 62)">
      <rect class="card-dim" x="0" y="0" width="168" height="28" rx="5"/>
      <text x="84" y="18" text-anchor="middle" class="label">Auto-Discovery</text>
      <!-- amber dot -->
      <circle cx="14" cy="14" r="3.5" class="accent"/>
    </g>

    <g transform="translate(12, 98)">
      <rect class="card-dim" x="0" y="0" width="168" height="28" rx="5"/>
      <text x="84" y="18" text-anchor="middle" class="label">WebSocket Hub</text>
    </g>

    <g transform="translate(12, 134)">
      <rect class="card-dim" x="0" y="0" width="168" height="28" rx="5"/>
      <text x="84" y="18" text-anchor="middle" class="label">Alert Engine</text>
    </g>
  </g>

  <!-- arrows out of ingestion -->
  <!-- → DB -->
  <path class="arrow" d="M 580 148 L 660 112" marker-end="url(#arrow)"/>
  <!-- → WS -->
  <path class="accent-stroke" d="M 580 180 L 660 196" marker-end="url(#arrow-accent)"/>
  <!-- → Alert webhook -->
  <path class="arrow" d="M 580 212 L 660 280" marker-end="url(#arrow)"/>

  <!-- ─── DB ─── -->
  <g transform="translate(660, 80)">
    <rect class="card" x="0" y="0" width="140" height="64" rx="8"/>
    <text x="70" y="26" text-anchor="middle" class="title">TimescaleDB</text>
    <text x="70" y="44" text-anchor="middle" class="subtitle">single hypertable</text>
    <text x="70" y="58" text-anchor="middle" class="badge">90-day retention</text>
  </g>

  <!-- ─── DASHBOARD ─── -->
  <g transform="translate(660, 164)">
    <rect class="card" x="0" y="0" width="140" height="64" rx="8"/>
    <text x="70" y="26" text-anchor="middle" class="title">Dashboard</text>
    <text x="70" y="44" text-anchor="middle" class="subtitle">SvelteKit · gridstack</text>
    <text x="70" y="58" text-anchor="middle" class="accent-text">● live cards</text>
  </g>

  <!-- ─── WEBHOOK ─── -->
  <g transform="translate(660, 248)">
    <rect class="card-dim" x="0" y="0" width="140" height="64" rx="8"/>
    <text x="70" y="26" text-anchor="middle" class="title">Webhook</text>
    <text x="70" y="44" text-anchor="middle" class="subtitle">Slack · n8n · Discord</text>
    <text x="70" y="58" text-anchor="middle" class="badge">generic JSON POST</text>
  </g>

  <!-- ─── PROXY/BROWSER (top right summary) ─── -->
  <g transform="translate(820, 128)">
    <rect class="card-dim" x="0" y="0" width="120" height="136" rx="8"/>
    <text x="60" y="24" text-anchor="middle" class="title">Browser</text>
    <text x="60" y="42" text-anchor="middle" class="subtitle">https://localhost</text>

    <line x1="16" y1="58" x2="104" y2="58" class="arrow" stroke-dasharray="2 3"/>

    <text x="60" y="76" text-anchor="middle" class="label">Caddy</text>
    <text x="60" y="92" text-anchor="middle" class="subtitle">auto-TLS reverse proxy</text>

    <text x="60" y="114" text-anchor="middle" class="badge">/api · /ws · /</text>
  </g>

  <!-- arrow: dashboard → browser via proxy -->
  <path class="arrow" d="M 800 196 L 820 196" marker-end="url(#arrow)"/>

  <!-- Footer callout -->
  <g transform="translate(24, 320)">
    <circle cx="5" cy="0" r="3.5" class="accent"/>
    <text x="18" y="4" class="badge">5 services · 0 external services · docker compose up -d</text>
  </g>
</svg>
