name: nexos

networks:
  nexos-net:
    driver: bridge

volumes:
  nexos-pgdata:
  nexos-broker-data:
  nexos-caddy-data:
  nexos-caddy-config:

services:

  # ── MQTT Broker ─────────────────────────────────────────────────────────────
  broker:
    image: eclipse-mosquitto:2
    container_name: nexos-broker
    restart: unless-stopped
    networks:
      - nexos-net
    ports:
      - "8883:8883"
    volumes:
      - ./broker/config:/mosquitto/config:ro
      - ./broker/certs:/mosquitto/certs:ro
      - ./broker/passwd:/mosquitto/passwd:ro
      - nexos-broker-data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-p", "8883",
             "--cafile", "/mosquitto/certs/ca.crt",
             "-u", "${MQTT_HEALTH_USER}",
             "-P", "${MQTT_HEALTH_PASS}",
             "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── TimescaleDB ──────────────────────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: nexos-db
    restart: unless-stopped
    networks:
      - nexos-net
    ports:
      # Bound to loopback only — enables host-side migrate/psql during development
      # without exposing the DB to the LAN.
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: nexos
      POSTGRES_USER: nexos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - nexos-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexos -d nexos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Go Ingestion + API ───────────────────────────────────────────────────────
  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: nexos-ingestion
    restart: unless-stopped
    networks:
      - nexos-net
    ports:
      # Loopback-only host mapping — enables `curl http://localhost:8080/health`
      # and direct API testing without going through Caddy.
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: postgres://nexos:${POSTGRES_PASSWORD}@db:5432/nexos?sslmode=disable
      MQTT_BROKER_URL: mqtts://broker:8883
      MQTT_USERNAME: ${MQTT_INGESTION_USER}
      MQTT_PASSWORD: ${MQTT_INGESTION_PASS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-24h}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168h}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-90}
      ALERT_TIMEOUT_SECONDS: ${ALERT_TIMEOUT_SECONDS:-60}
      MQTT_CA_CERT_PATH: /certs/ca.crt
    volumes:
      - ./broker/certs/ca.crt:/certs/ca.crt:ro
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── SvelteKit Dashboard ──────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: nexos-dashboard
    restart: unless-stopped
    networks:
      - nexos-net
    # Intentionally no host port mapping. The dashboard is reached through
    # Caddy on http://localhost / https://localhost (same origin as the API).
    # Exposing :3000 directly collides with every other dev tool on the
    # planet (Next.js, CRA, Vite preview) and the cookie flow requires
    # same-origin access anyway.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Caddy Reverse Proxy ──────────────────────────────────────────────────────
  proxy:
    image: caddy:2-alpine
    container_name: nexos-proxy
    restart: unless-stopped
    networks:
      - nexos-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - nexos-caddy-data:/data
      - nexos-caddy-config:/config
    depends_on:
      ingestion:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 443 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
