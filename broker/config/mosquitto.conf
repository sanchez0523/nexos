# ── TLS listener only — no plaintext port ───────────────────────────────────
listener 8883
protocol mqtt

cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key

tls_version tlsv1.2

# ── Authentication ───────────────────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/passwd

# ── ACL ─────────────────────────────────────────────────────────────────────
# ingestion-worker: subscribe only to devices/#
# device accounts: publish only to their own subtopic
acl_file /mosquitto/config/acl

# ── Persistence ──────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ──────────────────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_timestamp true
